version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: popular_monsters_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: parka
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: popular_monsters
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: popular_monsters_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: